version: "3.9"

services:
  frontend:
    container_name: cebba_frontend

    build:
      context: .

      dockerfile: Dockerfile

    image: cebba/frontend:latest

    restart: unless-stopped

    ports:
      - "3000:80"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]

      interval: 30s

      timeout: 5s

      retries: 3

      start_period: 10s

    networks:
      - cebba

networks:
  cebba:
    driver: bridge
